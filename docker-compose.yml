services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
      - ./frontend/dist:/srv/frontend:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - awsclone-internal

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/awsclone.db
      - MINIO_ENDPOINT=minio:9000
      - CADDY_ADMIN_URL=http://caddy:2019
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/cloudflared:/usr/bin/cloudflared:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"
    depends_on:
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 200M
    networks:
      - awsclone-internal
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
      - CI_CD=true
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - awsclone-internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  awsclone-internal:
    driver: bridge
    name: awsclone-internal
